# ============================================================
# 部署仓库专用 - Swarm / K3s 模式
# 
# 部署前请修改以下环境变量或创建 .env 文件
# ============================================================

services:
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  web:
    image: ${REGISTRY:-dockerhub.datagrand.com}/jinquzu/zuoye/flask-orm:${TAG:-latest}
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DATABASE_URI=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/dg_orm
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_ENCRYPTION=${ENABLE_ENCRYPTION:-false}
      - AES_KEY=${AES_KEY:-0123456789abcdef0123456789abcdef}
      - DB_HOST=mysql
      - DB_PORT=3306
      - GUNICORN_WORKERS=2
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  mysql:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=dg_orm
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  mysql-data:
  redis-data:

networks:
  app-network:
    driver: overlay
