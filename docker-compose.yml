services:
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-orm
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
    image: flask-orm:prod
    container_name: web-orm
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DATABASE_URI=mysql+pymysql://root:${MYSQL_ROOT_PASSWORD:-root}@mysql:3306/dg_orm
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENABLE_ENCRYPTION=${ENABLE_ENCRYPTION:-false}
      - AES_KEY=${AES_KEY:-0123456789abcdef0123456789abcdef}
      - DB_HOST=mysql
      - DB_PORT=3306
      - GUNICORN_WORKERS=4
      - GUNICORN_PORT=5000
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql-orm
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root}
      - MYSQL_DATABASE=dg_orm
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis-orm
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  app-network:
    driver: bridge
